name: Firebase Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: firebase-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      VITE_ANALYTICS_DISABLED: ${{ vars.VITE_ANALYTICS_DISABLED || 'false' }}
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        # TODO: Restore `pnpm run build` after the Spotify function build is stable.
        # This intentionally skips `functions:build` so Hosting can deploy while the function is temporarily non-blocking.
        run: pnpm exec tsc && pnpm exec vite build

      - name: Prepare Hosting fallback config
        # TODO: Remove this after the Spotify function Hosting rewrite deploy permissions are stable.
        run: |
          node -e 'const fs = require("node:fs"); const config = JSON.parse(fs.readFileSync("firebase.json", "utf8")); const rewriteSource = "/api/spotify/now-playing"; config.hosting.rewrites = (config.hosting.rewrites || []).filter((rewrite) => rewrite.source !== rewriteSource); delete config.functions; fs.writeFileSync("firebase.hosting-fallback.json", JSON.stringify(config, null, 2) + "\n");'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Spotify function
        # TODO: Remove continue-on-error after the Spotify function deploy is stable.
        continue-on-error: true
        run: pnpm exec firebase deploy --only functions:spotifyNowPlaying --project "$FIREBASE_PROJECT_ID" --non-interactive

      - name: Deploy live channel
        id: deploy_live_channel
        # TODO: Remove continue-on-error after the Spotify function Hosting rewrite deploy permissions are stable.
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live

      - name: Deploy live channel without Spotify rewrite
        if: ${{ steps.deploy_live_channel.outcome == 'failure' }}
        # TODO: Remove this fallback after the Spotify function Hosting rewrite deploy permissions are stable.
        run: pnpm exec firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive --config firebase.hosting-fallback.json
